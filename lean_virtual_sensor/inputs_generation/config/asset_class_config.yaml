# =============================================================================
# asset_class_config.yaml
# Per-asset-class constraints and probability weights for synthetic generation.
#
# This file encodes the physical and engineering constraints that vary by
# asset class. Values are drawn from:
#   - API 583:2014 (equipment scope and geometry guidance)
#   - ISO 14224:2016 Table A.43 (dimensional data for piping/vessels)
#   - Data dictionary allowed ranges and notes
#   - Engineering consensus on typical O&G facility populations
#
# Structure per class:
#   component_diameter   : {min, max[, mode]} outer diameter in mm
#   furnished_thickness  : {min, max} wall thickness in mm (dictionary envelope)
#   geometry_sampling    : non-PIPE only — triangular diameter + wall scheme
#   insulation_thickness : {min, max} insulation layer in mm (guidance only)
#   geometry_class       : list of allowed geometry_class values for this class
#   geometry_class_weights : probability weights over allowed geometry classes
#   orientation_weights  : probability weights over HORIZONTAL | VERTICAL | ANGLED
#   geometry_complexity_weights : probability weights over SIMPLE | MODERATE | COMPLEX
#
# IMPORTANT: All weights within a group must sum to 1.0.
# Basis for weights documented inline. Where no published reference exists,
# values are marked [ENGINEERING_JUDGEMENT] and should be reviewed by a
# domain expert before production use.
# =============================================================================

PIPE:
  # Data dictionary: 33.4 – 610 mm (pipe NPS)
  component_diameter:
    min: 33.4
    max: 610.0
  # API 574 / ASME B36.10 schedule wall thicknesses
  furnished_thickness:
    min: 3.0
    max: 50.0
  # Typical insulation for process piping (API 583 guidance)
  insulation_thickness:
    min: 25
    max: 150
  geometry_class_allowed:
    - STRAIGHT_RUN
    - ELBOW
    - NOZZLE
  # Most process piping is straight run; elbows common; nozzles at tie-ins
  # [ENGINEERING_JUDGEMENT] — no published frequency data for geometry mix
  geometry_class_weights:
    STRAIGHT_RUN: 0.70
    ELBOW: 0.22
    NOZZLE: 0.08
  # Process piping predominantly horizontal; some vertical headers and risers
  # [ENGINEERING_JUDGEMENT] — consistent with API 583 Section 5.3 narrative
  orientation_weights:
    HORIZONTAL: 0.65
    VERTICAL: 0.20
    ANGLED: 0.15
  # Most pipe is moderate complexity; small-bore utility lines tend to simple
  # [ENGINEERING_JUDGEMENT]
  geometry_complexity_weights:
    SIMPLE: 0.30
    MODERATE: 0.50
    COMPLEX: 0.20


PRESSURE_VESSEL:
  # Data dictionary: 500 – 4,000 mm
  component_diameter:
    min: 500.0
    max: 4000.0
    mode: 2000.0
  # Vessel wall thicknesses per ASME VIII and typical O&G designs
  furnished_thickness:
    min: 6.0
    max: 100.0
  geometry_sampling:
    method: triangular_coupled_wall
    wall:
      t_over_d_min: 0.008
      t_over_d_max: 0.014
      clamp_min: 6.0
      clamp_max: 120.0
  insulation_thickness:
    min: 50
    max: 150
  geometry_class_allowed:
    - CYLINDRICAL_SHELL
    - SPHERICAL_SHELL
    - HEMISPHERICAL_HEAD
    - ELLIPTICAL_HEAD
    - TORISPHERICAL_HEAD
    - NOZZLE
  # [ENGINEERING_JUDGEMENT]
  geometry_class_weights:
    CYLINDRICAL_SHELL: 0.52
    SPHERICAL_SHELL: 0.03
    HEMISPHERICAL_HEAD: 0.05
    ELLIPTICAL_HEAD: 0.15
    TORISPHERICAL_HEAD: 0.15
    NOZZLE: 0.10
  # Roughly split — horizontal separators/drums vs vertical towers
  # [ENGINEERING_JUDGEMENT] — API 583 Section 5 references both
  orientation_weights:
    HORIZONTAL: 0.50
    VERTICAL: 0.45
    ANGLED: 0.05
  # Vessels often have complex nozzle patterns and support attachments
  # [ENGINEERING_JUDGEMENT]
  geometry_complexity_weights:
    SIMPLE: 0.15
    MODERATE: 0.50
    COMPLEX: 0.35


HEAT_EXCHANGER:
  # Shell-and-tube exchangers dominate O&G — OD of shell
  component_diameter:
    min: 200.0
    max: 1500.0
    mode: 800.0
  furnished_thickness:
    min: 6.0
    max: 50.0
  geometry_sampling:
    method: triangular_coupled_wall
    wall:
      t_over_d_min: 0.010
      t_over_d_max: 0.020
      clamp_min: 6.0
      clamp_max: 120.0
  insulation_thickness:
    min: 50
    max: 100
  geometry_class_allowed:
    - CYLINDRICAL_SHELL
    - HEMISPHERICAL_HEAD
    - ELLIPTICAL_HEAD
    - NOZZLE
  # [ENGINEERING_JUDGEMENT]
  geometry_class_weights:
    CYLINDRICAL_SHELL: 0.55
    HEMISPHERICAL_HEAD: 0.05
    ELLIPTICAL_HEAD: 0.10
    NOZZLE: 0.30
  # Shell-and-tube exchangers predominantly horizontal
  # [ENGINEERING_JUDGEMENT] — consistent with typical plot plan layouts
  orientation_weights:
    HORIZONTAL: 0.75
    VERTICAL: 0.20
    ANGLED: 0.05
  # Multiple nozzles and support saddles → moderate to complex
  # [ENGINEERING_JUDGEMENT]
  geometry_complexity_weights:
    SIMPLE: 0.10
    MODERATE: 0.50
    COMPLEX: 0.40


AIR_COOLER:
  # Data dictionary: 100 – 500 mm
  component_diameter:
    min: 100.0
    max: 500.0
    mode: 300.0
  furnished_thickness:
    min: 3.0
    max: 15.0
  geometry_sampling:
    method: triangular_fixed_wall
    wall:
      min: 3.0
      max: 10.0
  insulation_thickness:
    min: 25
    max: 75
  geometry_class_allowed:
    - CYLINDRICAL_SHELL
    - NOZZLE
  # [ENGINEERING_JUDGEMENT]
  geometry_class_weights:
    CYLINDRICAL_SHELL: 0.60
    NOZZLE: 0.40
  # Air coolers are elevated horizontal structures in virtually all installations
  # Basis: standard plot plan practice; API 583 AIR_COOLER notes
  orientation_weights:
    HORIZONTAL: 0.90
    VERTICAL: 0.05
    ANGLED: 0.05
  # Header boxes with multiple connections — typically moderate to complex
  # [ENGINEERING_JUDGEMENT]
  geometry_complexity_weights:
    SIMPLE: 0.10
    MODERATE: 0.55
    COMPLEX: 0.35


STORAGE_TANK:
  # Data dictionary: 3,000 – 40,000 mm
  component_diameter:
    min: 3000.0
    max: 40000.0
    mode: 15000.0
  # API 650 minimum shell thickness rules; no upper bound specified beyond 50mm
  furnished_thickness:
    min: 6.0
    max: 50.0
  geometry_sampling:
    method: triangular_coupled_wall
    wall:
      t_over_d_min: 0.0004
      t_over_d_max: 0.001
      clamp_min: 6.0
      clamp_max: 120.0
  insulation_thickness:
    min: 50
    max: 200
  geometry_class_allowed:
    - CYLINDRICAL_SHELL
    - CONICAL_SHELL
    - HEMISPHERICAL_HEAD
    - TORISPHERICAL_HEAD
  # [ENGINEERING_JUDGEMENT] — most insulated tank surface is cylindrical shell
  geometry_class_weights:
    CYLINDRICAL_SHELL: 0.65
    CONICAL_SHELL: 0.15
    HEMISPHERICAL_HEAD: 0.05
    TORISPHERICAL_HEAD: 0.15
  # Fixed-roof storage tanks are vertical — standard practice
  # Basis: API 650; API 653 (tank inspection)
  orientation_weights:
    HORIZONTAL: 0.10
    VERTICAL: 0.88
    ANGLED: 0.02
  # Large flat surfaces but many nozzles, manways, and ladder attachments
  # [ENGINEERING_JUDGEMENT]
  geometry_complexity_weights:
    SIMPLE: 0.15
    MODERATE: 0.55
    COMPLEX: 0.30


COLUMN:
  # Data dictionary: 800 – 5,000 mm
  component_diameter:
    min: 800.0
    max: 5000.0
    mode: 2500.0
  furnished_thickness:
    min: 8.0
    max: 100.0
  geometry_sampling:
    method: triangular_coupled_wall
    wall:
      t_over_d_min: 0.008
      t_over_d_max: 0.014
      clamp_min: 6.0
      clamp_max: 120.0
  insulation_thickness:
    min: 50
    max: 200
  geometry_class_allowed:
    - CYLINDRICAL_SHELL
    - CONICAL_SHELL
    - ELLIPTICAL_HEAD
    - TORISPHERICAL_HEAD
    - NOZZLE
  # [ENGINEERING_JUDGEMENT]
  geometry_class_weights:
    CYLINDRICAL_SHELL: 0.55
    CONICAL_SHELL: 0.05
    ELLIPTICAL_HEAD: 0.15
    TORISPHERICAL_HEAD: 0.10
    NOZZLE: 0.15
  # Columns are almost exclusively vertical — fundamental design requirement
  # Basis: distillation/separation process engineering; API 583 Section 5
  orientation_weights:
    HORIZONTAL: 0.04
    VERTICAL: 0.94
    ANGLED: 0.02
  # Tall columns have trays, many nozzles, and insulation support rings → complex
  # [ENGINEERING_JUDGEMENT]
  geometry_complexity_weights:
    SIMPLE: 0.05
    MODERATE: 0.35
    COMPLEX: 0.60


REACTOR:
  # Data dictionary: 1,000 – 4,000 mm
  component_diameter:
    min: 1000.0
    max: 4000.0
    mode: 1800.0
  # Thick walls due to high pressure and hydrogen service — up to 100 mm+
  # Data dictionary explicitly states reactors up to 100 mm
  furnished_thickness:
    min: 15.0
    max: 100.0
  geometry_sampling:
    method: triangular_coupled_wall
    wall:
      t_over_d_min: 0.010
      t_over_d_max: 0.018
      clamp_min: 6.0
      clamp_max: 120.0
  insulation_thickness:
    min: 75
    max: 250
  geometry_class_allowed:
    - CYLINDRICAL_SHELL
    - HEMISPHERICAL_HEAD
    - ELLIPTICAL_HEAD
    - NOZZLE
  # [ENGINEERING_JUDGEMENT]
  geometry_class_weights:
    CYLINDRICAL_SHELL: 0.55
    HEMISPHERICAL_HEAD: 0.10
    ELLIPTICAL_HEAD: 0.15
    NOZZLE: 0.20
  # Reactors predominantly vertical (gravity flow of catalyst/fluids)
  # [ENGINEERING_JUDGEMENT] — consistent with hydroprocessing plant layouts
  orientation_weights:
    HORIZONTAL: 0.12
    VERTICAL: 0.85
    ANGLED: 0.03
  # Dense nozzle patterns, quench connections, catalyst loading nozzles → complex
  # [ENGINEERING_JUDGEMENT]
  geometry_complexity_weights:
    SIMPLE: 0.05
    MODERATE: 0.30
    COMPLEX: 0.65

