# =============================================================================
# generation_config.yaml
# Runtime parameters for synthetic dataset generation.
#
# This is the ONLY file you need to change between runs.
# Increment version and change seed for a new independent dataset.
# All other config files (schema, asset_class_config, conditional_rules)
# remain stable across runs unless the data model itself changes.
#
# Entry point: python generate.py
# Output:      outputs/synthetic_v{version}_seed{seed}.csv
# =============================================================================

run:
  version: "1.0"
  random_seed: 42
  n_rows: 1000
  reference_date: "2026-05-13"   # Anchor date for all date generation (today)
  output_path: "outputs/synthetic_v1.0_seed42.csv"
  halt_on_test_failure: true      # Do not write output if any pytest test fails


# ── ASSET CLASS PROPORTIONS ───────────────────────────────────────────────────
# Target row counts per asset class. Must sum to n_rows (1000).
#
# Basis: See docs/synthetic_inputs_methodology.md §5 for full rationale and references.
# Summary: Real-world O&G populations are ~55-65% pipe (HOIS survey data,
# API 583 field evidence). We dial PIPE back to 38% here deliberately to
# improve minority class coverage for ML training. This is a training diversity
# decision, not a claim about real-world proportions.
#
# References:
#   - API 583:2014 Table 4.1 (equipment scope — piping is primary focus class)
#   - HOIS (Hydrocarbon Operations Inspection Scheme) surveys: ~55-65% of CUI
#     damage records on piping systems
#   - Energy Institute / TWI CUI surveys 2014-2020: vessels + exchangers ~15-20%
#     combined in typical refinery asset registers
#   - ISO 14224:2016 Table A.4 equipment taxonomy: relative population guidance

asset_class_proportions:
  PIPE: 380
  PRESSURE_VESSEL: 175
  HEAT_EXCHANGER: 145
  COLUMN: 105
  STORAGE_TANK: 75
  AIR_COOLER: 70
  REACTOR: 50
  # Total: 1000 (OTHER removed — not in data dictionary)


# ── EXPOSURE ZONE DISTRIBUTION ────────────────────────────────────────────────
# Target distribution over exposure zones across all asset classes.
# The real dataset is heavily MARINE (~80%) due to its specific source facility.
# This synthetic dataset targets a more balanced distribution for generalisability.
#
# [ENGINEERING_JUDGEMENT] — no single published source for these proportions.
# Intended to represent a mixed portfolio (offshore + onshore + arid regions).

exposure_zone_weights:
  MARINE: 0.35
  TEMPERATE: 0.40
  ARID_DRY: 0.15
  SEVERE: 0.10


# ── DATE GENERATION PARAMETERS ────────────────────────────────────────────────
# Controls how dates are drawn relative to asset_commissioning_date and reference_date.
# All values in years unless stated.

date_generation:
  # Insulation: how recently relative to asset commissioning was insulation installed?
  # Most insulation is replaced at some point; uniform draw over the asset lifetime.
  insulation_age_min_years: 1
  insulation_age_max_fraction_of_asset_age: 1.0   # insulation can be as old as the asset

  # Coating: similar logic, but organic coatings typically replaced more often than insulation
  coating_age_min_years: 1
  coating_age_max_fraction_of_asset_age: 1.0

  # Last inspection: bounded by inspection interval norms
  # API 581 / ISO 14224 recommend 4-5 year intervals; critical assets 6 months
  inspection_age_min_years: 0.5    # most recent inspection at least 6 months ago
  inspection_age_max_years: 10     # data dictionary max default: 10 years (never inspected)


# ── WALL LOSS PARAMETERS ──────────────────────────────────────────────────────
# last_inspection_thickness generated as: furnished_thickness - wall_loss
# wall_loss fraction drawn from Beta distribution parameterised below.
# This produces realistic (right-skewed) wall loss — most assets have minor
# loss, a tail has significant thinning.
#
# wall_loss_fraction = wall_loss / furnished_thickness
# Capped at 0.60 (60% wall loss — beyond this, asset typically retired)
#
# [ENGINEERING_JUDGEMENT] — Beta distribution parameters not calibrated to data.
# Review against real inspection datasets when available.

wall_loss:
  distribution: beta
  alpha: 1.5    # Right-skewed — most assets have low fractional wall loss
  beta: 8.0
  min_fraction: 0.01   # At least 1% wall loss (some corrosion expected)
  max_fraction: 0.60   # Hard cap at 60% wall loss


# ── TEMPERATURE SERIES (T_process) PARAMETERS ─────────────────────────────────
# Constants for the per-asset thermal time constant tau, used by the separate
# time-series module (temperature_series.py). tau sets how fast an asset slides
# toward its cooldown target during a shutdown:
#   tau_h = C * R / 3600
#   C = rho * c * (pi/4)(Do^2 - Di^2)      metal heat capacity per metre
#   R = ln(Dins / Do) / (2 * pi * k_ins)   insulation resistance per metre
#
# metal_properties: room-temperature density (rho) and specific heat (c) per
# metallurgy family. Only these four families are modelled; NICKEL_ALLOY and
# OTHER are out of scope (nickel alloys vary too widely — Inconel / Monel /
# Hastelloy — to pin one credible pair, and OTHER is unspecified) and have no
# entry, so a lookup for them is an error to be handled upstream, not a silent
# default.
#
# insulation_conductivity_w_per_mk: k_ins per material (W/m·K). Single source
# of truth on this branch; values are the ASTM-cited ones that match the
# asset-temperature branch's `insulation_lambda_w_per_mk`, so the two reconcile
# at merge rather than carrying two competing tables.

temperature_series:
  # Generation window: 90 days = one quarter, matching avg_cycles_per_quarter
  # and the 2,160-hour ambient slice. window_hours = window_days * 24.
  window_days: 90
  # Floor on a single cycle's off-duration (hours): guards the rare
  # high-fraction / high-cycle-count case where (1-f)*spacing rounds below a
  # meaningful shutdown. A cycle shorter than this isn't a real excursion.
  min_cycle_duration_hours: 2
  # Running-period sensor wiggle (Step 8): +/- this many degrees C, uniform,
  # added only to hours at operating temperature (slides/dips left clean).
  running_noise_amplitude_c: 2.0
  # Asymmetric recovery (Step 7): the return to operating temperature (active
  # re-heating / re-cooling by the process) is faster than the passive
  # excursion. Recovery legs use tau * this factor; < 1 = faster, 1 = symmetric.
  recovery_tau_factor: 0.5
  # Global physical bounds (Step 9): every hour is clamped to [min, max] of the
  # asset, then to this global range (process service: NGL/refining/petrochem).
  global_temperature_min_c: -100.0
  global_temperature_max_c: 500.0
  metal_properties:                                                             # rho [kg/m^3], c [J/(kg·K)]
    CARBON_STEEL:    { density_kg_per_m3: 7850, specific_heat_j_per_kg_k: 490 }  # plain carbon steel
    LOW_ALLOY_STEEL: { density_kg_per_m3: 7850, specific_heat_j_per_kg_k: 460 }  # AISI 4140
    AUSTENITIC_SS:   { density_kg_per_m3: 8000, specific_heat_j_per_kg_k: 500 }  # 304 / 316
    DUPLEX_SS:       { density_kg_per_m3: 7800, specific_heat_j_per_kg_k: 480 }  # 2205
  insulation_conductivity_w_per_mk:
    FOAMGLASS:        0.045   # ASTM C552, cellular glass
    MINERAL_WOOL:     0.040   # ASTM C547, rock/slag wool
    FIBERGLASS:       0.035   # ASTM C547, glass fibre
    CALCIUM_SILICATE: 0.058   # ASTM C533
    PERLITE:          0.052   # ASTM C610, expanded perlite
    ASBESTOS:         0.150   # [ENGINEERING_JUDGEMENT] legacy asbestos lagging; k ~0.10-0.16 W/m·K, no current ASTM spec — review with SME
    UNKNOWN:          0.040   # conservative mid-range fallback
