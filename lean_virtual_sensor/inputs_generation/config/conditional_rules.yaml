      - { nps_in: "3/8", dn: 10, od_mm: 17.1, schedules: { schedule_40: { wall_mm: 2.31 }, schedule_80: { wall_mm: 3.20 } } }
      - { nps_in: "1/2", dn: 15, od_mm: 21.3, schedules: { schedule_40: { wall_mm: 2.77 }, schedule_80: { wall_mm: 3.73 } } }
      - { nps_in: "3/4", dn: 20, od_mm: 26.7, schedules: { schedule_40: { wall_mm: 2.87 }, schedule_80: { wall_mm: 3.91 } } }
