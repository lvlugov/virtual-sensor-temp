[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "virtual-sensor"
version = "0.1.0"
description = "Deterministic virtual sensor pipeline (asset_similarity, water_factor, risk_calc)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.8",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["virtual_sensor*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["virtual_sensor", "scripts", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "W"]
